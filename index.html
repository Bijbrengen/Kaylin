<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2b3a2a">
  <title>Kamp Vossenberg: Commando Navigatiemissie</title>
  <style>
    :root {
      --bg: #2b3a2a;
      --bg-deep: #12180f;
      --panel: rgba(9, 14, 8, 0.68);
      --panel-strong: rgba(4, 7, 4, 0.88);
      --line: #00ff00;
      --line-soft: rgba(0, 255, 0, 0.32);
      --orange: #ff6600;
      --orange-soft: rgba(255, 102, 0, 0.24);
      --text: #f2f5ea;
      --muted: #b9c8ae;
      --danger: #ff2b2b;
      --danger-bg: #5f0000;
      --shadow: rgba(0, 0, 0, 0.42);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100svh;
      margin: 0;
      background:
        linear-gradient(180deg, rgba(0, 0, 0, 0.14), rgba(0, 0, 0, 0.44)),
        repeating-linear-gradient(135deg, rgba(255, 255, 255, 0.025) 0 2px, transparent 2px 12px),
        var(--bg);
      color: var(--text);
      font-family: "Arial Narrow", "Roboto Condensed", "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: calc(env(safe-area-inset-top) + 10px) 12px 10px;
      background: linear-gradient(180deg, #11190f 0%, #182515 100%);
      border-bottom: 2px solid var(--orange);
      box-shadow: 0 8px 20px var(--shadow);
    }

    .banner {
      max-width: 760px;
      margin: 0 auto;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: #050905;
      color: var(--orange);
      text-align: center;
      text-transform: uppercase;
      font-size: 0.78rem;
      font-weight: 900;
      line-height: 1.2;
      overflow-wrap: break-word;
    }

    .timer {
      max-width: 760px;
      margin: 8px auto 0;
      padding: 8px 10px;
      border-left: 4px solid var(--line);
      background: rgba(0, 0, 0, 0.46);
      color: var(--line);
      font-family: "Courier New", monospace;
      font-size: 1.08rem;
      font-weight: 900;
      text-align: center;
    }

    .flash {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 92px);
      left: 10px;
      right: 10px;
      z-index: 40;
      max-width: 760px;
      margin: 0 auto;
      padding: 12px 14px;
      border: 2px solid var(--danger);
      background: var(--danger-bg);
      color: #fff;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
      text-align: center;
      text-transform: uppercase;
      font-size: 0.98rem;
      font-weight: 900;
      line-height: 1.28;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .flash.is-visible {
      opacity: 1;
      transform: translateY(0);
      animation: alarmPulse 640ms ease-in-out 2;
    }

    @keyframes alarmPulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.7); }
    }

    .app-shell {
      width: auto;
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 14px calc(42px + env(safe-area-inset-bottom));
    }

    .screen {
      min-height: calc(100svh - 150px);
      padding: 18px 0 0;
    }

    .screen-frame {
      width: auto;
      padding: 18px 14px;
      border-top: 2px solid var(--line);
      border-bottom: 2px solid var(--orange);
      background: var(--panel);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      overflow-wrap: break-word;
    }

    .kicker,
    .coords,
    .field-label {
      margin: 0;
      color: var(--line);
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1 {
      margin: 8px 0 14px;
      color: #fff;
      font-size: 1.8rem;
      line-height: 1.04;
      text-transform: uppercase;
    }

    h2 {
      margin: 0 0 10px;
      color: var(--orange);
      font-size: 1.1rem;
      line-height: 1.2;
      text-transform: uppercase;
    }

    p {
      margin: 0 0 14px;
      color: var(--text);
      font-size: 1.02rem;
      line-height: 1.52;
    }

    .muted {
      color: var(--muted);
    }

    .coords {
      display: inline-flex;
      width: 100%;
      min-height: 34px;
      align-items: center;
      margin: 0 0 16px;
      padding: 7px 9px;
      border: 1px solid var(--line-soft);
      background: rgba(0, 0, 0, 0.32);
      color: var(--line);
    }

    .briefing-copy {
      margin-bottom: 20px;
    }

    .task-block,
    .intel-block,
    .calibration-log,
    .final-block {
      margin: 18px 0;
      padding: 14px;
      border: 1px solid var(--line-soft);
      background: rgba(0, 0, 0, 0.3);
    }

    .task-block p,
    .intel-block p,
    .final-block p {
      margin-bottom: 0;
    }

    .button-stack {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      display: inline-flex;
      width: 100%;
      min-height: 54px;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border: 2px solid var(--orange);
      border-radius: 6px;
      background: var(--orange);
      color: #080a07;
      font-size: 0.96rem;
      font-weight: 900;
      line-height: 1.15;
      text-align: center;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0, 0, 0, 0.55);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.55);
    }

    .btn:focus-visible,
    input:focus-visible {
      outline: 3px solid #fff;
      outline-offset: 3px;
    }

    .btn.secondary {
      border-color: var(--line);
      background: #061006;
      color: var(--line);
    }

    .btn.danger {
      border-color: var(--danger);
      background: #180000;
      color: #fff;
    }

    .answer-form {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .input-row {
      display: grid;
      gap: 8px;
    }

    .field-label {
      color: var(--orange);
    }

    input {
      width: 100%;
      min-height: 56px;
      border: 2px solid var(--line);
      border-radius: 4px;
      background: #050805;
      color: var(--line);
      font-family: "Courier New", monospace;
      font-size: 1.45rem;
      font-weight: 900;
      line-height: 1;
      text-align: center;
      caret-color: var(--orange);
      appearance: none;
      -webkit-appearance: none;
    }

    input::placeholder {
      color: rgba(0, 255, 0, 0.42);
    }

    .intel-image {
      overflow: hidden;
      margin: 16px 0 0;
      border: 2px solid var(--orange);
      border-radius: 6px;
      background: #050805;
    }

    .intel-image img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 58svh;
      object-fit: contain;
      background: #050805;
    }

    .image-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 16px;
    }

    .success-image {
      margin-top: 16px;
    }

    .hint-suggestion {
      margin: 12px 0 0;
      padding: 10px 12px;
      border-left: 4px solid var(--orange);
      background: rgba(255, 102, 0, 0.12);
      color: var(--text);
      font-size: 0.96rem;
      line-height: 1.42;
    }

    .status-stamp {
      display: inline-flex;
      min-height: 32px;
      align-items: center;
      margin: 4px 0 14px;
      padding: 6px 10px;
      border: 1px solid var(--orange);
      background: var(--orange-soft);
      color: var(--orange);
      font-family: "Courier New", monospace;
      font-size: 0.84rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .final-time {
      display: block;
      margin-top: 10px;
      color: var(--line);
      font-family: "Courier New", monospace;
      font-size: 2rem;
      font-weight: 900;
      text-align: center;
    }

    .choice-grid {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .calibration-log {
      display: grid;
      gap: 12px;
    }

    .auto-advance {
      margin-top: 16px;
      padding: 12px;
      border: 1px dashed var(--orange);
      color: var(--orange);
      font-family: "Courier New", monospace;
      font-size: 0.88rem;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
    }

    .image-missing {
      display: none;
      margin: 10px 0 0;
      padding: 10px 12px;
      border: 1px dashed var(--orange);
      color: var(--orange);
      font-family: "Courier New", monospace;
      font-size: 0.82rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .step-panel {
      margin-top: 18px;
      padding: 14px;
      border: 1px solid var(--orange);
      background: rgba(255, 102, 0, 0.1);
    }

    body.celebration {
      --bg: #fff8e6;
      --panel: rgba(255, 255, 255, 0.9);
      --line: #c99a22;
      --line-soft: rgba(201, 154, 34, 0.38);
      --orange: #b8860b;
      --orange-soft: rgba(201, 154, 34, 0.18);
      --text: #2c2412;
      --muted: #6f5a20;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 214, 80, 0.5) 0 3px, transparent 4px),
        radial-gradient(circle at 80% 14%, rgba(255, 102, 164, 0.45) 0 3px, transparent 4px),
        radial-gradient(circle at 34% 70%, rgba(0, 180, 160, 0.38) 0 3px, transparent 4px),
        linear-gradient(180deg, #fffef7, #fff4cc);
      color: var(--text);
    }

    body.celebration .app-header {
      background: #fff;
      border-bottom-color: #d4af37;
    }

    body.celebration .banner,
    body.celebration .timer {
      border-color: #d4af37;
      background: #fffaf0;
      color: #9b6b00;
    }

    body.celebration .screen-frame {
      border: 2px solid #d4af37;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 14px 34px rgba(155, 107, 0, 0.18);
    }

    body.celebration h1 {
      color: #9b6b00;
    }

    body.celebration p {
      color: #2c2412;
    }

    .confetti-line {
      min-height: 34px;
      margin: 0 0 12px;
      color: #c99a22;
      font-size: 1.35rem;
      font-weight: 900;
      text-align: center;
      letter-spacing: 0.14rem;
    }

    @media (min-width: 720px) {
      .app-header {
        padding-left: 24px;
        padding-right: 24px;
      }

      .app-shell {
        padding-left: 24px;
        padding-right: 24px;
      }

      .screen-frame {
        padding: 24px;
      }

      .banner {
        font-size: 0.9rem;
      }

      h1 {
        font-size: 2.15rem;
      }

      .choice-grid {
        grid-template-columns: 1fr 1fr;
      }

      .image-grid {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="banner">KAMP VOSSENBERG: COMMANDO NAVIGATIEMISSIE</div>
    <div class="timer" id="timer">TACTICAL TIME: 00:00</div>
  </header>

  <div class="flash" id="flash" role="alert" aria-live="assertive"></div>

  <main class="app-shell" id="app" tabindex="-1"></main>

  <script>
    const app = document.getElementById("app");
    const timerDisplay = document.getElementById("timer");
    const flashBanner = document.getElementById("flash");
    const isTrainerMode = new URLSearchParams(window.location.search).get("role") === "trainer";
    let missionData = null;

    const PURPLE_POST_TARGET = 5;
    const GPS_TARGET = {
      lat: 52.820194,
      lng: 6.538139,
      toleranceMeters: 50
    };
    const TRAINER_COORDS = {
      start: "52.815835, 6.548451",
      mission1: "52.816178, 6.547542",
      mission2: "52.816415, 6.546675",
      mission3: "52.816668, 6.545142",
      crossing: "52.817024, 6.545692",
      fence: "52.818072, 6.549939",
      stones: "52.821173, 6.544594",
      canal: "52.820194, 6.538139"
    };
    const CROSSING_TO_FENCE = {
      distanceMeters: 308,
      bearingDegrees: 68
    };
    const PLAQUE_TEXT = "17 juni 2017 Aat en Frances 40 jaar getrouwd aangeboden door familie en vrienden";

    let rebukeQueue = [];

    const missions = {
      1: {
        tag: "FASE 2",
        title: "DE DIKKE BOOM",
        coords: TRAINER_COORDS.mission1,
        image: "photo/2_uitdaging_dikke_boom.jpg",
        imageAlt: "Monumentale dikke boom op Landgoed de Vossenberg.",
        briefing: "Vanaf het startpunt navigeer je 72 meter in een kompashoek van 302&deg;. Je treft hier een levende, monumentale woudreus aan. De gemeente Midden-Drenthe handhaaft een kapverbod voor bomen met een diameter van 40 cm of meer op een hoogte van 1,30 meter.",
        task: "Bepaal de omtrek van de stam op exact 1,30 meter hoogte. Voer daarna de omtrek in hele centimeters in.",
        label: "Gemeten omtrek in hele centimeters",
        placeholder: "265",
        success: "Gefeliciteerd! Deze reus heeft een dikte van ruim 84 cm en is absoluut beschermd!",
        nextLabel: "PROCEED TO INTEL PACKET 2",
        validate: value => value >= 260 && value <= 270
      },
      2: {
        tag: "FASE 3",
        title: "DE DODE REUS",
        coords: "52.816415, 6.546675",
        image: "photo/3_uitdaging_dode_boom.jpg",
        imageAlt: "Kale dode boomstam in het terrein.",
        briefing: "Vanaf de dikke boom volgt een tactische verplaatsing. Richting: EXACT 293 graden (West-Noordwest). Afstand: EXACT 63 meter. Gebruik je pacing (stappen tellen). Je stuit op een ge&iuml;soleerde, kale, dode boomstam.",
        task: "Bepaal de hoogte van deze dode boom. Hoe hoog is deze dode boom in hele meters?",
        label: "Hoogte in hele meters",
        placeholder: "7",
        success: "Correct! Hier halen we exact 21 ongespleten kachelblokken van 33 cm uit voor de haard!",
        nextLabel: "PROCEED TO INTEL PACKET 3",
        validate: value => value === 7
      },
      3: {
        tag: "FASE 4",
        title: "DE GEVAARLIJKE HANGER",
        coords: "52.816668, 6.545142",
        image: "photo/4_uitdaging_gevallen_boom.jpg",
        successImage: "photo/web/3_6_oefenen_richting_en_afstand.jpg",
        successImageAlt: "Pad vanaf de gevallen boom richting de kruising.",
        imageAlt: "Omgevallen boom die de doorgang blokkeert.",
        briefing: "Vanaf de dode reus volgt de eindspurt naar de gevaarlijke hanger. Richting: EXACT 281 graden (vrijwel pal West). Afstand: EXACT 107 meter. Pas op: hier ligt een gevaarlijke, omgevallen boom die de doorgang blokkeert.",
        task: "Voordat de hangende boom verwerkt kan worden, moeten de stevige zijtakken eraf. Tel exact hoeveel zijtakken minimaal 5 cm dik zijn en dus eerst afgezaagd moeten worden. Dunnere takken kun je afbreken.",
        label: "Aantal dikke zijtakken",
        placeholder: "54",
        success: "Klaar! 54 takken geteld. De weg is vrijgemaakt.",
        validate: value => value === 54
      }
    };

    const state = {
      view: "prebriefing",
      mission: 1,
      completedMission: null,
      elapsed: 0,
      running: false,
      timerId: null,
      flashId: null,
      autoAdvanceId: null,
      nudgeId: null,
      spaRevealId: null,
      spaRevealReady: false,
      spaRevealed: false,
      tunnelStep: "stones",
      tunnelNudge: false,
      finaleStep: "choices",
      fenceStep: "march",
      plaqueStep: "describe",
      fenceHint: false,
      missionOneStep: "circumference",
      missionOneCircumference: null,
      hints: {
        1: false,
        2: false,
        3: false
      },
      finalTime: "00:00"
    };

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function updateTimer() {
      timerDisplay.textContent = `TACTICAL TIME: ${formatTime(state.elapsed)}`;
    }

    function ensureTimer() {
      if (state.timerId) {
        return;
      }

      state.timerId = window.setInterval(() => {
        if (!state.running) {
          return;
        }

        state.elapsed += 1;
        updateTimer();
      }, 1000);
    }

    function setRunning(shouldRun) {
      state.running = shouldRun;
      ensureTimer();
      updateTimer();
    }

    function clearAutoAdvance() {
      if (state.autoAdvanceId) {
        window.clearTimeout(state.autoAdvanceId);
        state.autoAdvanceId = null;
      }
    }

    function clearNudge() {
      if (state.nudgeId) {
        window.clearTimeout(state.nudgeId);
        state.nudgeId = null;
      }
    }

    function clearSpaRevealTimer() {
      if (state.spaRevealId) {
        window.clearTimeout(state.spaRevealId);
        state.spaRevealId = null;
      }
    }

    function showFlash(message) {
      window.clearTimeout(state.flashId);
      flashBanner.innerHTML = message;
      flashBanner.classList.remove("is-visible");
      void flashBanner.offsetWidth;
      flashBanner.classList.add("is-visible");
      state.flashId = window.setTimeout(() => {
        flashBanner.classList.remove("is-visible");
      }, 3600);
    }

    function hideFlash() {
      window.clearTimeout(state.flashId);
      flashBanner.classList.remove("is-visible");
      flashBanner.innerHTML = "";
    }

    function randomRebuke() {
      if (rebukeQueue.length === 0) {
        rebukeQueue = [...missionData.copy.rebukes].sort(() => Math.random() - 0.5);
      }

      return rebukeQueue.pop();
    }

    function addPenalty(seconds, message) {
      state.elapsed += seconds;
      updateTimer();
      showFlash(message);
    }

    function punishWrongAnswer(message = randomRebuke()) {
      addPenalty(120, `${message} ${missionData.copy.messages.wrongAnswerSuffix}`);
    }

    function trainerPlaceholder(value, fallback = "voer antwoord in") {
      return isTrainerMode ? value : fallback;
    }

    function trainerValueAttr(value) {
      return isTrainerMode && value !== null && value !== undefined ? ` value="${String(value).replace(/"/g, "&quot;")}"` : "";
    }

    function integerInputMarkup(id, label, placeholder, fallback = "voer getal in", trainerValue = placeholder) {
      return `
        <div class="input-row">
          <label class="field-label" for="${id}">${label}</label>
          <input
            id="${id}"
            data-integer-input
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="off"
            placeholder="${trainerPlaceholder(placeholder, fallback)}"
            ${trainerValueAttr(trainerValue)}
            aria-label="${label}"
          >
        </div>
      `;
    }

    function textInputMarkup(id, label, placeholder, fallback = "voer waarde in", trainerValue = placeholder) {
      return `
        <div class="input-row">
          <label class="field-label" for="${id}">${label}</label>
          <input
            id="${id}"
            type="text"
            autocomplete="off"
            placeholder="${trainerPlaceholder(placeholder, fallback)}"
            ${trainerValueAttr(trainerValue)}
            aria-label="${label}"
          >
        </div>
      `;
    }

    function imageMarkup(src, alt, extraClass = "") {
      return `
        <figure class="intel-image ${extraClass}">
          <img src="${src}" alt="${alt}" onerror="this.closest('figure').nextElementSibling.style.display='block'">
        </figure>
        <p class="image-missing">Asset ontbreekt nog: ${src}</p>
      `;
    }

    function imageGridMarkup(images) {
      return `
        <div class="image-grid">
          ${images.map(image => imageMarkup(image.src, image.alt)).join("")}
        </div>
      `;
    }

    function trainerCoordsMarkup(label, coords) {
      return isTrainerMode ? `<div class="coords">TRAINER COORDS - ${label}: ${coords}</div>` : "";
    }

    function setCelebrationMode(enabled) {
      document.body.classList.toggle("celebration", enabled);
    }

    function renderPrebriefing() {
      app.innerHTML = `
        <section class="screen" aria-labelledby="prebriefing-title">
          <div class="screen-frame">
            <p class="kicker">FASE 1</p>
            <h1 id="prebriefing-title">De Pre-Briefing</h1>
            ${trainerCoordsMarkup("STARTPUNT", TRAINER_COORDS.start)}
            <p class="briefing-copy">Kaylin kijkt graag naar commando-training op tv. Dus wat geef je iemand die daarvan houdt? Geen gewone wandeling, maar een eigen training in de naaste omgeving: observeren, navigeren, rekenen, doorzetten en vooral niet te snel denken dat je klaar bent.</p>
            ${imageGridMarkup([
              { src: "photo/web/intro_speurtocht.jpg", alt: "Introbeeld van de omgeving." },
              { src: "photo/web/intro_speurtocht_2.jpg", alt: "Introbeeld van het landgoed." },
              { src: "photo/web/intro_speurtocht_3.jpg", alt: "Introbeeld van het bos." }
            ])}
            <p class="briefing-copy">Als goede commando moet je in staat zijn dingen te onthouden van je omgeving. Een scherpe blik is het verschil tussen slagen en falen. Kijk goed naar de foto. Herken deze plek meteen. Ga zo snel mogelijk naar deze locatie toe op het landgoed. Pas als je er staat, druk je op de startknop.</p>
            ${imageMarkup("photo/1_uitdaging_oesterzwammen.jpg", "Boomstronk met het oesterzwammenbriefje op het startpunt.", "success-image")}
            <div class="button-stack">
              <button class="btn" type="button" data-action="start">IK STA OP HET STARTPUNT (START DE OPLEIDING)</button>
            </div>
          </div>
        </section>
      `;
    }

    function renderBriefing() {
      app.innerHTML = `
        <section class="screen" aria-labelledby="briefing-title">

    function render() {
      clearAutoAdvance();

        clearNudge();

      if (state.view !== "complete") {
        clearSpaRevealTimer();
      }

      if (state.view === "prebriefing") {
        renderPrebriefing();
        return;
      }

      if (state.view === "mission") {
        renderMission();
        return;
      }

      if (state.view === "success") {
        renderSuccess();
        return;
      }

      if (state.view === "calibration") {
        renderCalibration();
        return;
      }

      if (state.view === "tunnel") {
        renderTunnel();
        return;
      }

      if (state.view === "gps") {
        renderGps();
        return;
      }

      if (state.view === "finale") {
        renderFinale();
        return;
      }

      if (state.view === "fenceMarch") {
        renderFenceMarch();
        return;
      }

      if (state.view === "falseMission") {
        renderFalseMission();
        return;
      }

      renderComplete();
    }

      if (state.completedMission === 1) {
        setRunning(true);
        state.mission = 2;
      } else {
        state.mission = 3;
      }

      state.completedMission = null;
      state.view = "mission";
      render();
      focusApp();
    }

    function submitAnswer() {
      const input = document.getElementById("answer-input");
      const rawValue = input ? input.value.trim() : "";
      const value = rawValue === "" ? NaN : Number(rawValue);
      const mission = missions[state.mission];

      if (state.mission === 1 && state.missionOneStep === "circumference") {
        if (!Number.isInteger(value) || !mission.validate(value)) {
          punishWrongAnswer();
          if (input) {
            input.focus();
          }
          return;
        }

        hideFlash();
        state.missionOneCircumference = value;
        state.missionOneStep = "diameter";
        render();
        focusApp();
        return;
      }

      if (state.mission === 1 && state.missionOneStep === "diameter") {
        if (!Number.isInteger(value) || value < 80 || value > 89) {
          punishWrongAnswer();
          if (input) {
            input.focus();
          }
          return;
        }

        completeMission(state.mission);
        return;
      }

      if (!Number.isInteger(value) || !mission.validate(value)) {
        punishWrongAnswer();
        if (input) {
          input.focus();
        }
        return;
      }

      completeMission(state.mission);
    }

    function requestHint() {
      state.hints[state.mission] = true;
      addPenalty(120, missionData.copy.messages.hintPenalty);
      render();
    }

    function unlockFinale() {
      hideFlash();
      state.view = "finale";
      render();
      focusApp();
    }

    function startBlindMarch() {
      hideFlash();
      setRunning(true);
      state.finaleStep = "choices";
      state.view = "finale";
      render();
      focusApp();
    }

    function submitTunnelAnswer() {
      const input = document.getElementById("purple-posts");
      const value = input && input.value.trim() !== "" ? Number(input.value.trim()) : NaN;

      if (!Number.isInteger(value) || value !== PURPLE_POST_TARGET) {
        punishWrongAnswer(missionData.copy.messages.tunnelWrong);
        if (input) {
          input.focus();
        }
        return;
      }

      hideFlash();
      clearNudge();
      state.view = "gps";
      render();
      focusApp();
    }

    function parseGps(value) {
      const parts = value
        .trim()
        .replace(/;/g, ",")
        .split(/[,\s]+/)
        .filter(Boolean)
        .map(Number);

      if (parts.length < 2 || parts.some(part => Number.isNaN(part))) {
        return null;
      }

      return { lat: parts[0], lng: parts[1] };
    }

    function distanceMeters(a, b) {
      const radius = 6371000;
      const toRad = value => value * Math.PI / 180;
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const deltaLat = toRad(b.lat - a.lat);
      const deltaLng = toRad(b.lng - a.lng);
      const haversine = Math.sin(deltaLat / 2) ** 2
        + Math.cos(lat1) * Math.cos(lat2) * Math.sin(deltaLng / 2) ** 2;

      return 2 * radius * Math.atan2(Math.sqrt(haversine), Math.sqrt(1 - haversine));
    }

    function normalizeAnswer(value) {
      return value
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function normalizeLetterSequence(value) {
      return value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]/g, "");
    }

    function submitPlaceAnswer() {
      const input = document.getElementById("place-input");
      const value = input ? normalizeAnswer(input.value) : "";
      const validAnswers = missionData.answers.benchSynonyms.map(normalizeAnswer);

      if (!validAnswers.includes(value)) {
        punishWrongAnswer(missionData.copy.messages.placeWrong);
        if (input) {
          input.focus();
        }
        return;
      }

      hideFlash();
      state.plaqueStep = "proceed";
      render();
      focusApp();
    }

    function submitGpsAnswer() {
      const input = document.getElementById("gps-input");
      const coords = input ? parseGps(input.value) : null;
      const valid = coords && distanceMeters(coords, GPS_TARGET) <= GPS_TARGET.toleranceMeters;

      if (!valid) {
        punishWrongAnswer(missionData.copy.messages.gpsWrong);
        if (input) {
          input.focus();
        }
        return;
      }

      startFalseMissionTwist();
    }

    function logFinaleSteps() {
      hideFlash();
      state.finaleStep = "choices";
      render();
      focusApp();
    }

    function feelFence() {
      hideFlash();
      state.fenceStep = "march";
      state.view = "fenceMarch";
      render();
      focusApp();
    }

    function submitPlaqueAnswer() {
      const input = document.getElementById("plaque-input");
      const value = input ? normalizeLetterSequence(input.value) : "";
      const expected = normalizeLetterSequence(PLAQUE_TEXT);

      if (value !== expected) {
        punishWrongAnswer(missionData.copy.messages.plaqueWrong);
        if (input) {
          input.focus();
        }
        return;
      }

      hideFlash();
      state.fenceStep = "ready";
      render();
      focusApp();
    }

    function sendReportToHeadquarters() {
      hideFlash();
      state.tunnelStep = "stones";
      state.view = "tunnel";
      render();
      focusApp();
    }

    function startFalseMissionTwist() {
      hideFlash();
      setRunning(false);
      state.finalTime = formatTime(state.elapsed);
      state.view = "falseMission";
      render();
      focusApp();
      state.autoAdvanceId = window.setTimeout(() => {
        state.view = "complete";
        render();
        focusApp();
      }, 3000);
    }

    function bindIntegerInputs() {
      document.querySelectorAll("[data-integer-input]").forEach(input => {
        input.addEventListener("keydown", event => {
          if (["e", "E", "+", "-", ".", ","].includes(event.key)) {
            event.preventDefault();
          }
        });

        input.addEventListener("input", () => {
          input.value = input.value.replace(/[^\d]/g, "");
        });
      });
    }

    app.addEventListener("click", event => {
      const button = event.target.closest("[data-action]");
      if (!button) {
        return;
      }

      const action = button.getAttribute("data-action");

      if (action === "start") {
        startMissionOne();
      }

      if (action === "hint") {
        requestHint();
      }

      if (action === "proceed") {
        proceedFromSuccess();
      }

      if (action === "unlock-finale") {
        unlockFinale();
      }

      if (action === "start-blind-march") {
        startBlindMarch();
      }

      if (action === "stones-photo") {
        state.tunnelStep = "question";
        state.tunnelNudge = false;
        clearNudge();
        render();
        focusApp();
      }

      if (action === "feel-nothing") {
        state.finaleStep = "extra";
        render();
        focusApp();
      }

      if (action === "too-far") {
        state.finaleStep = "back";
        render();
        focusApp();
      }

      if (action === "feel-fence") {
        feelFence();
      }

      if (action === "fence-hint") {
        state.fenceHint = true;
        addPenalty(120, missionData.copy.messages.fenceHintPenalty);
        render();
        focusApp();
      }

      if (action === "at-bench") {
        state.fenceStep = "report";
        state.plaqueStep = "describe";
        render();
        focusApp();
      }

      if (action === "at-route-post") {
        state.plaqueStep = "question";
        render();
        focusApp();
      }

      if (action === "send-report") {
        sendReportToHeadquarters();
      }

      if (action === "reveal-spa") {
        state.spaRevealed = true;
        clearSpaRevealTimer();
        render();
        focusApp();
      }
    });

    app.addEventListener("submit", event => {
      event.preventDefault();
      const form = event.target.closest("[data-action='answer']");
      if (form) {
        submitAnswer();
      }

      const tunnelForm = event.target.closest("[data-action='tunnel-answer']");
      if (tunnelForm) {
        submitTunnelAnswer();
      }

      const gpsForm = event.target.closest("[data-action='gps-answer']");
      if (gpsForm) {
        submitGpsAnswer();
      }

      const plaqueForm = event.target.closest("[data-action='plaque-answer']");
      if (plaqueForm) {
        submitPlaqueAnswer();
      }

      const placeForm = event.target.closest("[data-action='place-answer']");
      if (placeForm) {
        submitPlaceAnswer();
      }

      const finaleStepForm = event.target.closest("[data-action='finale-step-log']");
      if (finaleStepForm) {
        logFinaleSteps();
      }
    });

    async function init() {
      try {
        const response = await fetch("mission-data.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`mission-data.json laden mislukt (${response.status})`);
        }

        missionData = await response.json();
        updateTimer();
        render();
      } catch (error) {
        app.innerHTML = `
          <section class="screen" aria-labelledby="load-error-title">
            <div class="screen-frame">
              <p class="kicker">SYSTEEMFOUT</p>
              <h1 id="load-error-title">Mission Data Ontbreekt</h1>
              <p>De missiegegevens konden niet worden geladen. Start deze site via GitHub Pages of een lokale webserver, zodat <code>mission-data.json</code> beschikbaar is.</p>
              <p class="muted">${error.message}</p>
            </div>
          </section>
        `;
      }
    }

    init();
  </script>
</body>
</html>
